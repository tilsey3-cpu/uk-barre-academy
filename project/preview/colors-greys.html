<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"></head>
<body class="card">
  <div class="label">Warm Greys — for hierarchy on light surfaces</div>
  <div class="row" style="gap:8px">
    <div class="swatch" style="background:#D1D1D1;color:#0A0A0A">
      <div class="name">Grey 100</div><div class="hex">#D1D1D1</div>
    </div>
    <div class="swatch" style="background:#A8A8A8;color:#0A0A0A">
      <div class="name">Grey 200</div><div class="hex">#A8A8A8</div>
    </div>
    <div class="swatch" style="background:#6E6E6E;color:#F7F7F5">
      <div class="name">Grey 300</div><div class="hex">#6E6E6E</div>
    </div>
    <div class="swatch" style="background:#3A3A3A;color:#F7F7F5">
      <div class="name">Grey 400</div><div class="hex">#3A3A3A</div>
    </div>
  </div>
  <div class="hairline"></div>
  <div style="font-size:12px;color:var(--fg-3);max-width:60ch">Body text uses Grey 400. Captions and meta use Grey 300. Disabled / muted uses Grey 200. Hairlines use Grey 100.</div>
</body></html>

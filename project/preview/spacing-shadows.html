<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"></head>
<body class="card" style="gap:18px">
  <div class="label">Elevation — barely there</div>
  <div style="display:flex;gap:18px;align-items:center">
    <div style="display:flex;flex-direction:column;align-items:center;gap:8px">
      <div style="width:120px;height:64px;background:#FFFFFF;border:1px solid #E5E4DF;border-radius:6px"></div>
      <div style="font-family:var(--font-mono);font-size:10px;color:#6E6E6E">0 · hairline only</div>
    </div>
    <div style="display:flex;flex-direction:column;align-items:center;gap:8px">
      <div style="width:120px;height:64px;background:#FFFFFF;border-radius:6px;box-shadow:0 1px 2px rgba(10,10,10,0.04)"></div>
      <div style="font-family:var(--font-mono);font-size:10px;color:#6E6E6E">1</div>
    </div>
    <div style="display:flex;flex-direction:column;align-items:center;gap:8px">
      <div style="width:120px;height:64px;background:#FFFFFF;border-radius:6px;box-shadow:0 4px 18px rgba(10,10,10,0.06)"></div>
      <div style="font-family:var(--font-mono);font-size:10px;color:#6E6E6E">2 · default</div>
    </div>
    <div style="display:flex;flex-direction:column;align-items:center;gap:8px">
      <div style="width:120px;height:64px;background:#FFFFFF;border-radius:6px;box-shadow:0 12px 40px rgba(10,10,10,0.08)"></div>
      <div style="font-family:var(--font-mono);font-size:10px;color:#6E6E6E">3 · modal</div>
    </div>
  </div>
</body></html>

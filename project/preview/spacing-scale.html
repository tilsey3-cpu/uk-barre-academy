<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"></head>
<body class="card" style="gap:14px">
  <div class="label">Spacing scale — 4 / 8 base</div>
  <div style="display:flex;align-items:flex-end;gap:10px">
    <div style="display:flex;flex-direction:column;align-items:center;gap:6px"><div style="width:4px;height:4px;background:#0A0A0A"></div><div style="font-family:var(--font-mono);font-size:10px;color:#6E6E6E">4</div></div>
    <div style="display:flex;flex-direction:column;align-items:center;gap:6px"><div style="width:8px;height:8px;background:#0A0A0A"></div><div style="font-family:var(--font-mono);font-size:10px;color:#6E6E6E">8</div></div>
    <div style="display:flex;flex-direction:column;align-items:center;gap:6px"><div style="width:12px;height:12px;background:#0A0A0A"></div><div style="font-family:var(--font-mono);font-size:10px;color:#6E6E6E">12</div></div>
    <div style="display:flex;flex-direction:column;align-items:center;gap:6px"><div style="width:16px;height:16px;background:#0A0A0A"></div><div style="font-family:var(--font-mono);font-size:10px;color:#6E6E6E">16</div></div>
    <div style="display:flex;flex-direction:column;align-items:center;gap:6px"><div style="width:24px;height:24px;background:#0A0A0A"></div><div style="font-family:var(--font-mono);font-size:10px;color:#6E6E6E">24</div></div>
    <div style="display:flex;flex-direction:column;align-items:center;gap:6px"><div style="width:32px;height:32px;background:#0A0A0A"></div><div style="font-family:var(--font-mono);font-size:10px;color:#6E6E6E">32</div></div>
    <div style="display:flex;flex-direction:column;align-items:center;gap:6px"><div style="width:48px;height:48px;background:#0A0A0A"></div><div style="font-family:var(--font-mono);font-size:10px;color:#6E6E6E">48</div></div>
    <div style="display:flex;flex-direction:column;align-items:center;gap:6px"><div style="width:64px;height:64px;background:#0A0A0A"></div><div style="font-family:var(--font-mono);font-size:10px;color:#6E6E6E">64</div></div>
    <div style="display:flex;flex-direction:column;align-items:center;gap:6px"><div style="width:96px;height:96px;background:#0A0A0A"></div><div style="font-family:var(--font-mono);font-size:10px;color:#6E6E6E">96</div></div>
  </div>
</body></html>

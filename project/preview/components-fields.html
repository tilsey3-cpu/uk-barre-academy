<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"></head>
<body class="card" style="gap:14px">
  <div class="label">Form fields</div>
  <div style="display:flex;gap:16px;align-items:flex-end">
    <label style="display:flex;flex-direction:column;gap:6px;flex:1">
      <span style="font-size:12px;color:#6E6E6E;letter-spacing:-0.005em">Full name</span>
      <input style="background:transparent;border:none;border-bottom:1px solid #0A0A0A;padding:8px 0;font-family:inherit;font-size:15px;color:#0A0A0A;outline:none" value="Eleanor Hartley"/>
    </label>
    <label style="display:flex;flex-direction:column;gap:6px;flex:1">
      <span style="font-size:12px;color:#6E6E6E">Studio location</span>
      <input style="background:transparent;border:none;border-bottom:1px solid #D1D1D1;padding:8px 0;font-family:inherit;font-size:15px;color:#A8A8A8;outline:none" placeholder="London"/>
    </label>
  </div>
  <div style="display:flex;gap:14px;align-items:center;margin-top:6px">
    <label style="display:flex;align-items:center;gap:8px;font-size:14px;color:#3A3A3A;cursor:pointer">
      <span style="width:16px;height:16px;border:1px solid #0A0A0A;border-radius:2px;background:#0A0A0A;display:inline-flex;align-items:center;justify-content:center;color:#F7F7F5;font-size:11px">✓</span>
      Already teaching
    </label>
    <label style="display:flex;align-items:center;gap:8px;font-size:14px;color:#3A3A3A;cursor:pointer">
      <span style="width:16px;height:16px;border:1px solid #D1D1D1;border-radius:2px;display:inline-flex"></span>
      Studio owner
    </label>
  </div>
</body></html>

<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"></head>
<body class="card" style="gap:16px">
  <div class="label">Buttons</div>
  <div style="display:flex;gap:12px;align-items:center;flex-wrap:wrap">
    <button style="background:#0A0A0A;color:#F7F7F5;border:none;padding:14px 22px;border-radius:4px;font-family:inherit;font-size:14px;font-weight:500;letter-spacing:-0.005em;cursor:pointer">Apply now</button>
    <button style="background:transparent;color:#0A0A0A;border:1px solid #0A0A0A;padding:13px 22px;border-radius:4px;font-family:inherit;font-size:14px;font-weight:500;cursor:pointer">Request the syllabus</button>
    <button style="background:transparent;color:#0A0A0A;border:none;padding:13px 0;font-family:inherit;font-size:14px;font-weight:500;cursor:pointer;border-bottom:1px solid #0A0A0A">Read the method →</button>
    <button style="background:#C8B79A;color:#0A0A0A;border:none;padding:14px 22px;border-radius:4px;font-family:inherit;font-size:14px;font-weight:500;cursor:pointer">Begin enrolment</button>
  </div>
  <div style="display:flex;gap:12px;align-items:center">
    <button style="background:#0A0A0A;color:#F7F7F5;border:none;padding:10px 16px;border-radius:4px;font-family:inherit;font-size:13px;font-weight:500;cursor:pointer">Small</button>
    <button style="background:#0A0A0A;color:#F7F7F5;border:none;padding:14px 22px;border-radius:4px;font-family:inherit;font-size:14px;font-weight:500;cursor:pointer">Medium</button>
    <button style="background:#0A0A0A;color:#F7F7F5;border:none;padding:18px 28px;border-radius:4px;font-family:inherit;font-size:15px;font-weight:500;cursor:pointer">Large</button>
  </div>
</body></html>
